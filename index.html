
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
<title>My Recipe App</title>
<style>
body {
  margin: 0;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #f7f3ea;
  color: #4a3f35;
}

/* 紙っぽい質感 */
.container {
  padding: 15px;
  padding-bottom: 80px;
  background: repeating-linear-gradient(
    to bottom,
    #f7f3ea,
    #f7f3ea 28px,
    #e3dccf 29px
  );
}

/* タイトル */
header {
  padding: 12px;
  background: #d8a48f;
  color: white;
  text-align: center;
  font-family: 'Kiwi Maru', serif;
  letter-spacing: 2px;
}

input, textarea {
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  border: none;
  border-bottom: 2px dashed #c5b7a5;
  background: transparent;
  font-size: 16px;
  font-family: 'Zen Maru Gothic', sans-serif;

  resize: none;
  overflow: hidden;
}

input:focus, textarea:focus {
  outline: none;
  border-bottom: 2px solid #a1887f;
}

.recipe {
  background: #fffdf8;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
  border-left: 5px solid #d8a48f;
}

button {
  background: #d8a48f;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  font-family: 'Kiwi Maru', serif;
}

button:active {
  transform: scale(0.97);
}

.image-area {
  width: 120px;
  height: 120px;
  border-radius: 15px;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 10px;
  cursor: pointer;
  position: relative;
}

.image-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#cameraIcon {
  font-size: 30px;
  color: #888;
}

#deleteBtn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  cursor: pointer;
}

/* 写真と料理名横並び */
.top-area {
  display: flex;
  gap: 15px;
  align-items: center;
}

/* 料理名の入力エリア */
.title-input {
  font-size: 22px;
  font-weight: bold;
  font-family: 'Kiwi Maru', serif;
  line-height: 1.2;
  min-height: 1.2em;
  border: none;
  border-bottom: 2px dashed #c5b7a5;
  background: transparent;
  flex: 1;              
  min-width: 0;         
  white-space: normal; 
  word-break: break-word;
  
  resize: none;
  overflow: hidden;  
  
  padding: 2px 0;
}

.title-input:focus {
  outline: none;
}


.hidden {
  display: none;
}

/* 入力フォーム */
input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

/* ◾️材料　とかのところのタイトル*/
.section-title {
  font-family: 'Kiwi Maru', serif;
  font-size: 16px;
  margin: 15px 0 5px;
}

.category {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

/* レシピカード */
.recipe {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}

/* 下部ナビ */
nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #eee;
}

nav button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #ddd;
}

nav button.active {
  background: #ff8c8c;
  color: white;
}
</style>
</head>

<body>

<header>My Recipe</header>

<div class="container">

  <!-- 入力画面 -->
  <div id="inputPage">

<div class="top-area">
  <div class="image-area" onclick="triggerFile()">
    <img id="preview" class="hidden">
    <div id="cameraIcon">＋</div>
    <button id="deleteBtn" class="hidden" onclick="deleteImage(event)">✖</button>
  </div>
 <textarea id="title" class="title-input" placeholder="料理名" rows="1"></textarea>
</div>
  
<input type="file" id="image" accept="image/*" class="hidden" onchange="previewImage(event)">
    
    <div class="section-title">■材料</div>
    <textarea id="ingredients" placeholder="材料"></textarea>
    <textarea id="steps" placeholder="作り方"></textarea>

    <div class="category">
      <label><input type="checkbox" value="メイン"> メイン</label>
      <label><input type="checkbox" value="汁物"> 汁物</label>
      <label><input type="checkbox" value="副菜"> 副菜</label>
      <label><input type="checkbox" value="おつまみ"> おつまみ</label>
      <label><input type="checkbox" value="その他"> その他</label>
    </div>

<button onclick="saveRecipe()">保存</button>

   
  </div>

  <!-- 一覧画面 -->
  <div id="listPage" class="hidden">
    <input id="search" placeholder="検索..." oninput="renderList()">

    <div id="recipeList"></div>
  </div>

</div>

<!-- 下部ナビ -->
<nav>
  <button id="tabInput" class="active" onclick="switchTab('input')">入力</button>
  <button id="tabList" onclick="switchTab('list')">一覧</button>
</nav>

<script> 
function triggerFile() {
  document.getElementById("image").click();
}

function deleteImage(event) {
  event.stopPropagation(); // クリックでファイル選択が開くの防ぐ

  const img = document.getElementById("preview");
  img.src = "";
  img.classList.add("hidden");

  document.getElementById("cameraIcon").style.display = "block";
  document.getElementById("deleteBtn").classList.add("hidden");

  document.getElementById("image").value = ""; // ファイルもリセット
}

function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.classList.remove("hidden");

    document.getElementById("cameraIcon").style.display = "none";
    document.getElementById("deleteBtn").classList.remove("hidden");
   };

  reader.readAsDataURL(file);
}
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

function switchTab(tab) {
  document.getElementById("inputPage").classList.toggle("hidden", tab !== "input");
  document.getElementById("listPage").classList.toggle("hidden", tab !== "list");

  document.getElementById("tabInput").classList.toggle("active", tab === "input");
  document.getElementById("tabList").classList.toggle("active", tab === "list");

  if (tab === "list") renderList();
}

function saveRecipe() {
  const title = document.getElementById("title").value;
  const ingredients = document.getElementById("ingredients").value;
  const steps = document.getElementById("steps").value;

  const categories = Array.from(
    document.querySelectorAll("input[type=checkbox]:checked")
  ).map(cb => cb.value);

  const image = document.getElementById("preview").src || "";

  const recipe = { title, ingredients, steps, categories, image };

  recipes.push(recipe);
  localStorage.setItem("recipes", JSON.stringify(recipes));

  alert("保存したよ！");
}

function renderList() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("recipeList");
  list.innerHTML = "";

  let filtered = recipes.filter(r =>
    r.title.toLowerCase().includes(keyword) ||
    r.ingredients.toLowerCase().includes(keyword) ||
    r.steps.toLowerCase().includes(keyword)
  );

  // あいうえお順
  filtered.sort((a, b) => a.title.localeCompare(b.title, "ja"));

  filtered.forEach(r => {
    const div = document.createElement("div");
    div.className = "recipe";

    div.innerHTML = `
      ${r.image ? `<img src="${r.image}" style="width:100%;border-radius:10px;">` : ""}
      <h4>${r.title}</h4>
      <p>${r.categories.join(", ")}</p>
    `;

    list.appendChild(div);
  });
}

  //料理名のところ
document.getElementById("title").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = (this.scrollHeight - 4) + "px"; 
});


 //材料のところ
const ingredientsEl = document.getElementById("ingredients");

// 初期状態で「・」を入れる
ingredientsEl.addEventListener("focus", function() {
  if (this.value === "") {
    this.value = "・";
  }
});

//改行した時のアクション
ingredientsEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault(); // 普通の改行を止める

    const cursorPos = this.selectionStart;
    const textBefore = this.value.substring(0, cursorPos);
    const textAfter = this.value.substring(cursorPos);

    this.value = textBefore + "\n・ " + textAfter;
this.selectionStart = this.selectionEnd = cursorPos + 3;
 autoResize(this);
  }
});

//材料と作り方の入力エリア
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// 材料
document.getElementById("ingredients").addEventListener("input", function() {
  autoResize(this);
});

// 作り方
document.getElementById("steps").addEventListener("input", function() {
  autoResize(this);
});

//作り方の1.2.3.のカウント
const stepsEl = document.getElementById("steps");
// 初期で「1、」入れる
stepsEl.addEventListener("focus", function() {
  if (this.value === "") {
    this.value = "1、";
  }
});

stepsEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();

    const cursorPos = this.selectionStart;
    const textBefore = this.value.substring(0, cursorPos);
    const textAfter = this.value.substring(cursorPos);

    // 今の行数をカウント
    const lines = textBefore.split("\n").length;
    const nextNumber = lines + "、";

    this.value = textBefore + "\n" + nextNumber + " " + textAfter;

    this.selectionStart = this.selectionEnd =
      cursorPos + nextNumber.length + 2;

    // 即リサイズ
    autoResize(this);
  }
});

</script>

</body>
</html>
