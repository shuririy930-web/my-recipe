<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
<title>Shuri's Recipe</title>
<style>
body {
  margin: 0;
  font-family: 'Shippori Mincho', serif;
  background: #f7f3ea;
  color: #4a3f35;
}

/* 紙っぽい質感 */
.container {
  padding: 15px;
  padding-bottom: 80px;
  background: #f7f3ea;
}

/* タイトル */
header {
  padding: 12px;
  background: #d8a48f;
  color: white;
  text-align: center;
  font-family: 'Kiwi Maru', serif;
  letter-spacing: 2px;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  font-size: 16px;
  line-height: 28px;

  border: none;
  outline: none;
  resize: none;
  overflow: hidden;

  background-color: #fffdf8;
  border-radius: 10px;

  /* ノート罫線 */
  background-image: linear-gradient(
    to bottom,
    transparent 27px,
    #e6ded3 28px
  );
  background-size: 100% 28px;
}

input:focus,
textarea:focus {
  outline: none !important;
  box-shadow: none !important;
}

.recipe {
  background: #fffdf8;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
  border-left: 5px solid #d8a48f;
}

button {
  background: #d8a48f;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  font-family: 'Kiwi Maru', serif;
}

button:active {
  transform: scale(0.97);
}

.image-area {
  width: 120px;
  height: 120px;
  border-radius: 15px;

  background: #fffdf8;

  /* ←ここが追加ポイント */
  border: 2px dashed #c5b7a5;  /* ノート風の優しい線 */
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);

  display: flex;
  align-items: center;
  justify-content: center;

  overflow: hidden;
  margin-bottom: 10px;
  cursor: pointer;
  position: relative;

  transition: 0.2s ease;
}

/* ホバーでちょい反応 */
.image-area:hover {
  background: #fdfaf5;
  transform: translateY(-1px);
}

.image-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#cameraIcon {
  font-size: 30px;
  color: #888;
}

#deleteBtn {
  position: absolute;
  top: 5px;
  right: 5px;

  width: 25px;
  height: 25px;

  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 14px;
  line-height: 1;

  cursor: pointer;
  padding: 0;
}

/* 写真と料理名横並び */
.top-area {
  display: flex;
  gap: 15px;
  align-items: center;
}

/* 料理名の入力エリア */
.title-input {
  font-size: 22px;
  font-weight: bold;
  font-family: 'Kiwi Maru', serif;
  line-height: 1.2;
  min-height: 1.2em;
  border: none;
  border-bottom: 2px dashed #c5b7a5;
  background: transparent;
  flex: 1;              
  min-width: 0;         
  white-space: normal; 
  word-break: break-word;
  
  resize: none;
  overflow: hidden;  
  
  padding: 2px 0;
}

.title-input:focus {
  outline: none;
}


.hidden {
  display: none;
}

/* 入力フォーム */
input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  -webkit-appearance: none;
  appearance: none;
  box-shadow: none !important;
  outline: none !important;
}

/* ◾️材料　とかのところのタイトル*/
.section-title {
  font-family: 'Kiwi Maru', serif;
  font-size: 16px;
  margin: 15px 0 5px;
}
.section-divider {
  border-bottom: 1px dashed #c5b7a5;
  margin: 12px 0;
}

.category {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

/* レシピカード */
.recipe {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}

/* カテゴリーの選択ボタン */
.cat-btn {
  cursor: pointer;
}

.cat-btn input {
  display: none;
}

.cat-btn span {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #d8a48f;
  background: #fffdf8;
  font-size: 14px;
  transition: all 0.2s;
}

/* 選択された時 */
.cat-btn input:checked + span {
  background: #d8a48f;
  color: white;
  border-color: #d8a48f;
  transform: scale(0.95);
}
/* ホバーでふわっと */
.cat-btn span:hover {
  background: #f3e1d8;
}

/* 下部ナビ */
nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #eee;
}

nav button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #ddd;
}

nav button.active {
  background: #ff8c8c;
  color: white;
}

/* 保存ボタン */
.save-wrap {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
/* 保存ボタン強化 */
.save-btn {
  width: 90%;
  max-width: 320px;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;

  background: #d8a48f;
  color: white;
  border: none;

  box-shadow: 0 6px 0 #b88472; /* ←押した感の影 */
  transition: all 0.15s ease;
}
/* 押したとき */
.save-btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #b88472;
}

/* 保存時の吸い込みエフェクト */
.save-btn.saving {
  animation: shrinkToCenter 0.4s forwards;
}

/* 背景暗転 */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

/* 中央ポップ */
#modal {
  background: #fffdf8;
  padding: 20px 30px;
  border-radius: 16px;
  font-size: 18px;
  font-family: 'Kiwi Maru', serif;
  color: #4a3f35;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  transform: scale(0.8);
  opacity: 0;
  transition: 0.25s ease;
}

/* 表示時 */
#overlay.show {
  display: flex;
}

#overlay.show #modal {
  transform: scale(1);
  opacity: 1;
}

@keyframes shrinkToCenter {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  60% {
    transform: scale(0.2);
    opacity: 0.8;
  }
  100% {
    transform: scale(0);
    opacity: 0;
  }
}

/* 画面ちょい反応 */
body.flash-save {
  animation: flashBg 0.4s ease;
}

@keyframes flashBg {
  0% { background-color: #f7f3ea; }
  30% { background-color: #fff1e6; }
  100% { background-color: #f7f3ea; }
}

/* トースト通知 */
#toast {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(216,164,143,0.95);
  color: white;
  padding: 12px 20px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
}

/* 表示状態 */
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* 一覧表示 */
.recipe-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: #fffdf8;
  border-radius: 10px;
  margin-bottom: 10px;
}
.recipe-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.thumb {
  width: 45px;
  height: 45px;
  border-radius: 8px;
  object-fit: cover;
  background: #eee;
}
.recipe-name {
  font-size: 16px;
}
.delete-btn {
  background: #aaa;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
}

/* 詳細表示 */
#detailModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}
#detailContent {
  background: #fffdf8;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
  max-height: 80%;
  overflow-y: auto;
}


</style>
</head>

<body>

<header>Shuri's Recipe</header>

<div class="container">

  <!-- 入力画面 -->
  <div id="inputPage">

<div class="top-area">
  <div class="image-area" onclick="triggerFile()">
    <img id="preview" class="hidden">
    <div id="cameraIcon">＋</div>
    <button id="deleteBtn" class="hidden" onclick="deleteImage(event)">✖</button>
  </div>
 <textarea id="title" class="title-input" placeholder="料理名" rows="1"></textarea>
</div>
  
<input type="file" id="image" accept="image/*" class="hidden" onchange="previewImage(event)">
    
    <div class="section-title">《🧂材料》</div>
    <textarea id="ingredients" ></textarea>
    
    <div class="section-title">《🥣作り方》</div>
    <textarea id="steps" ></textarea>

    <div class="section-divider"></div>
    <div class="category">
      <label class="cat-btn"><input type="checkbox" value="メイン"><span>メイン</span></label>
      <label class="cat-btn"><input type="checkbox" value="副菜"><span>副菜</span></label>
      <label class="cat-btn"><input type="checkbox" value="汁物"><span>汁物</span></label>
      <label class="cat-btn"><input type="checkbox" value="おつまみ"><span>おつまみ</span></label>
      <label class="cat-btn"><input type="checkbox" value="デザート"><span>デザート</span></label>
      <label class="cat-btn"><input type="checkbox" value="作り置き"><span>作り置き</span></label>
      <label class="cat-btn"><input type="checkbox" value="その他"><span>その他</span></label>
    </div>

    <div class="section-divider"></div>
    <div class="section-title">《📝メモ》</div>
    <textarea id="memo" ></textarea>
    
<div class="save-wrap">
  <button class="save-btn" onclick="saveRecipe()">保存</button>
</div>

   
  </div>

  <!-- 一覧画面 -->
  <div id="listPage" class="hidden">
    <input id="search" placeholder="検索..." oninput="renderList()">

    <div id="recipeList"></div>
  </div>

</div>

<!-- 下部ナビ -->
<nav>
  <button id="tabInput" class="active" onclick="switchTab('input')">入力</button>
  <button id="tabList" onclick="switchTab('list')">一覧</button>
</nav>

<div id="detailModal" class="hidden">
  <div id="detailContent"></div>
  <button onclick="closeDetail()">閉じる</button>
</div>

<script> 
let isResetting = false;

function triggerFile() {
  document.getElementById("image").click();
}

function deleteImage(event) {
  event.stopPropagation(); // クリックでファイル選択が開くの防ぐ

  const img = document.getElementById("preview");
  img.src = "";
  img.classList.add("hidden");

  document.getElementById("cameraIcon").style.display = "block";
  document.getElementById("deleteBtn").classList.add("hidden");

  document.getElementById("image").value = ""; // ファイルもリセット
}

function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.classList.remove("hidden");

    document.getElementById("cameraIcon").style.display = "none";
    document.getElementById("deleteBtn").classList.remove("hidden");
   };

  reader.readAsDataURL(file);
}
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

function switchTab(tab) {
  document.getElementById("inputPage").classList.toggle("hidden", tab !== "input");
  document.getElementById("listPage").classList.toggle("hidden", tab !== "list");

  document.getElementById("tabInput").classList.toggle("active", tab === "input");
  document.getElementById("tabList").classList.toggle("active", tab === "list");

  if (tab === "list") renderList();
}

//フォームリセット用関数
function renderList() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("recipeList");
  list.innerHTML = "";

  let filtered = recipes.filter(r =>
    r.title.toLowerCase().includes(keyword) ||
    r.ingredients.toLowerCase().includes(keyword) ||
    r.steps.toLowerCase().includes(keyword)
  );

  filtered.sort((a, b) => a.title.localeCompare(b.title, "ja"));

  filtered.forEach((r, index) => {
    const div = document.createElement("div");
    div.className = "recipe-item";

    div.innerHTML = `
      <div class="recipe-row" onclick="openDetail(${index})">
        ${r.image ? `<img src="${r.image}" class="thumb">` : `<div class="thumb"></div>`}
        <div class="recipe-name">${r.title}</div>
      </div>
      <button class="delete-btn" onclick="deleteRecipe(${index}, event)">削除</button>
    `;

    list.appendChild(div);
  });
}

function resetForm() {
  isResetting = true;

  document.getElementById("title").value = "";
  document.getElementById("ingredients").value = "";
  document.getElementById("steps").value = "";
  document.getElementById("memo").value = "";

  const preview = document.getElementById("preview");

// イベント解除（画像読み込み系の暴走防止）
preview.onload = null;
preview.onerror = null;

// 画像リセット（完全初期化）
preview.removeAttribute("src");
preview.src = "";

// 非表示
  preview.classList.add("hidden");
  document.getElementById("cameraIcon").style.display = "block";
  document.getElementById("deleteBtn").classList.add("hidden");

  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.checked = false;
  });

  isResetting = false;
}

//保存の処理
function saveRecipe() {
  const btn = document.querySelector(".save-btn");
  btn.classList.add("saving");

  const fileInput = document.getElementById("image");
  const file = fileInput.files[0];

  // 画像なしの場合
  if (!file) {
    saveAfterImageReady("");
    return;
  }

  // 画像ありの場合（非同期）
  const reader = new FileReader();

  reader.onload = function(e) {
    saveAfterImageReady(e.target.result);
  };

  reader.readAsDataURL(file);
}

function saveAfterImageReady(image) {
  const btn = document.querySelector(".save-btn");

  const recipe = {
    title: document.getElementById("title").value,
    ingredients: document.getElementById("ingredients").value,
    steps: document.getElementById("steps").value,
    memo: document.getElementById("memo").value,
    categories: Array.from(
      document.querySelectorAll("input[type=checkbox]:checked")
    ).map(cb => cb.value),
    image: image
  };

  recipes.push(recipe);
  localStorage.setItem("recipes", JSON.stringify(recipes));

  resetForm();

  const overlay = document.getElementById("overlay");
  overlay.classList.add("show");

  setTimeout(() => {
    overlay.classList.remove("show");
  }, 2000);

  setTimeout(() => {
    btn.classList.remove("saving");
  }, 400);
}

  //料理名のところ
document.getElementById("title").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = (this.scrollHeight - 4) + "px"; 
});


 //材料のところ
const ingredientsEl = document.getElementById("ingredients");

// 初期状態で「・」を入れる
ingredientsEl.addEventListener("focus", function() {
  if (this.value === "" && !isResetting) {
    this.value = "・ ";
  }
});

//改行した時のアクション
ingredientsEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault(); // 普通の改行を止める

    const cursorPos = this.selectionStart;
    const textBefore = this.value.substring(0, cursorPos);
    const textAfter = this.value.substring(cursorPos);

    this.value = textBefore + "\n・ " + textAfter;
this.selectionStart = this.selectionEnd = cursorPos + 3;
 autoResize(this);
  }
});

//材料と作り方の入力エリア
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// 材料
document.getElementById("ingredients").addEventListener("input", function() {
  autoResize(this);
});

// 作り方
document.getElementById("steps").addEventListener("input", function() {
  autoResize(this);
});

//作り方の1.2.3.のカウント
const stepsEl = document.getElementById("steps");
// 初期で「1、」入れる
stepsEl.addEventListener("focus", function() {
  if (this.value === "" && !isResetting) {
    this.value = "1、";
  }
});

stepsEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();

    const cursorPos = this.selectionStart;
    const textBefore = this.value.substring(0, cursorPos);
    const textAfter = this.value.substring(cursorPos);

    // 最後の行を取得
    const lines = textBefore.split("\n");
    const lastLine = lines[lines.length - 1];

    // 今の番号を取得（数字だけ抜き出す）
    const match = lastLine.match(/^(\d+)、/);
    let nextNumber = 1;

    if (match) {
      nextNumber = parseInt(match[1]) + 1;
    }

    const insertText = nextNumber + "、";

    this.value = textBefore + "\n" + insertText + textAfter;

    this.selectionStart = this.selectionEnd =
      cursorPos + insertText.length + 1;

    autoResize(this);
  }
});


//詳細表示
function openDetail(index) {
  const r = recipes[index];

  document.getElementById("detailContent").innerHTML = `
    ${r.image ? `<img src="${r.image}" style="width:100%;border-radius:10px;">` : ""}
    <h3>${r.title}</h3>
    <p>【材料】<br>${r.ingredients}</p>
    <p>【作り方】<br>${r.steps}</p>
    <p>【メモ】<br>${r.memo}</p>
  `;

  document.getElementById("detailModal").style.display = "flex";
}

//一覧の中の削除
function closeDetail() {
  document.getElementById("detailModal").style.display = "none";
}

function deleteRecipe(index, event) {
  event.stopPropagation(); // 詳細開くの防ぐ

  if (!confirm("削除する？")) return;

  recipes.splice(index, 1);
  localStorage.setItem("recipes", JSON.stringify(recipes));
  renderList();
}

</script>

<div id="overlay">
  <div id="modal">保存完了</div>
</div>

</body>
</html>
